<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자유낙하 반응속도 테스트</title>
  
  <!-- Tailwind CSS (디자인 자동 적용) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (React 코드를 브라우저가 읽을 수 있게 변환) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-cyan-100 via-purple-100 to-pink-100 min-h-screen selection:bg-pink-300">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // 아이콘 컴포넌트들 (외부 이미지 없이 깨지지 않도록 SVG로 직접 구현)
    const ActivityIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
    const InfoIcon = ({size=18, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
    const UserIcon = ({size=18, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
    const RulerIcon = ({size=18, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.3 15.3l-5.3 5.3a2 2 0 0 1-2.8 0L2.5 9.9a2 2 0 0 1 0-2.8l5.3-5.3a2 2 0 0 1 2.8 0l10.7 10.7a2 2 0 0 1 0 2.8z"></path><path d="M16 8l-2 2"></path><path d="M12 12l-2 2"></path><path d="M8 16l-2 2"></path></svg>;
    const TrophyIcon = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>;
    const HistoryIcon = ({size=22, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>;
    const Trash2Icon = ({size=18, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;

    function App() {
      const [playerName, setPlayerName] = useState('');
      const [distance, setDistance] = useState('');
      const [history, setHistory] = useState([]);
      const [error, setError] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);

      // 반응 시간 계산 함수 (중3 과학 자유낙하 공식 적용)
      const calculateReactionTime = (cm) => {
        const h = cm / 100; // cm to m
        const g = 9.8;
        const t = Math.sqrt((2 * h) / g);
        return t;
      };

      // 결과에 따른 위트 있는 멘트 반환 함수
      const getWittyMessage = (time, cm) => {
        if (cm >= 50) return "졸았나요..? 긁?";
        if (time <= 0.13) return "와! 닌자 아니세요? 반응속도가 인간의 한계를 초월했습니다! 🥷";
        if (time <= 0.16) return "오! 운동신경이 국가대표 선수 급이시네요! 🏅";
        if (time <= 0.19) return "아주 훌륭해요! 고양이 부럽지 않은 반사신경입니다! 🐈";
        if (time <= 0.22) return "지극히 정상적인 지구인의 반응속도입니다! 🌍";
        return "살짝 느린 감이 있지만 괜찮아요! 다음엔 더 빨리 잡아보자구요! 🐢";
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        setError('');

        const distVal = parseFloat(distance);

        if (isNaN(distVal)) {
          setError('숫자를 입력해주세요.');
          return;
        }
        if (distVal < 0 || distVal > 50) {
          setError('0부터 50 사이의 숫자를 입력해주세요. (50cm 자 기준)');
          return;
        }

        setIsSubmitting(true);

        const time = calculateReactionTime(distVal);
        const message = getWittyMessage(time, distVal);

        const newRecord = {
          id: Date.now(),
          playerName: playerName.trim() || '익명 도전자',
          distance: distVal,
          time: time,
          message: message,
          timestamp: Date.now()
        };

        // 로컬 상태에 기록 추가 (가장 최근 것이 위로 오게)
        setHistory(prev => [newRecord, ...prev]);
        setDistance('');
        setIsSubmitting(false);
      };

      const handleResetHistory = () => {
        if (window.confirm('기록이 모두 삭제됩니다. 정말 지우시겠습니까?')) {
          setHistory([]);
        }
      };

      // 랭킹 데이터 계산 (50cm 미만 성공 기록 중 시간이 짧은 순으로 정렬)
      const rankedHistory = [...history]
        .filter(record => record.distance < 50)
        .sort((a, b) => a.time - b.time);

      return (
        <div className="py-8 px-4 sm:px-6 font-sans text-slate-800">
          <div className="max-w-2xl mx-auto space-y-8">
            
            {/* 헤더 섹션 */}
            <div className="bg-white/80 backdrop-blur-md rounded-[2rem] shadow-xl shadow-purple-200/50 border-4 border-white p-6 sm:p-8 text-center relative overflow-hidden">
              <div className="absolute top-4 right-4 flex items-center bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full text-xs font-black shadow-sm">
                내 기기 모드 📱
              </div>
              
              <div className="flex justify-center mb-4 text-purple-600 animate-bounce mt-4 sm:mt-0">
                <ActivityIcon />
              </div>
              <h1 className="text-3xl sm:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500 mb-3 drop-shadow-sm">
                🚀 자유낙하 반응속도 테스트
              </h1>
              <p className="text-slate-600 font-bold mb-6 text-lg">중3 과학 - 누가누가 제일 빠를까? ⚡</p>
              
              <div className="bg-white/60 border-2 border-dashed border-purple-300 rounded-2xl p-5 text-left text-sm text-purple-900 leading-relaxed font-medium">
                <h3 className="font-black flex items-center mb-2 text-base text-purple-700">
                  <InfoIcon className="mr-1" /> 💡 과학 원리 장착!
                </h3>
                <p>물체는 중력에 의해 1초에 <span className="text-pink-600 font-bold bg-pink-100 px-1 rounded">9.8m/s</span>씩 속력이 증가하며 자유낙하 해요.</p>
                <p className="mt-1">여러분이 자를 잡은 <span className="font-bold">거리</span>만 알면, 자유낙하 거리 공식을 이용해 <span className="font-bold">반응 시간</span>을 정확하게 계산할 수 있답니다! 🤓</p>
              </div>
            </div>

            {/* 입력 섹션 */}
            <div className="bg-white rounded-[2rem] shadow-xl shadow-purple-200/50 border-4 border-white p-6 sm:p-8 transform transition-all hover:scale-[1.01]">
              <form onSubmit={handleSubmit} className="flex flex-col gap-5">
                <div className="flex flex-col sm:flex-row gap-5">
                  <div className="flex-1">
                    <label htmlFor="playerName" className="block text-sm font-black text-slate-700 mb-2 flex items-center">
                      <UserIcon className="mr-1 text-pink-500" />
                      학번 및 이름 📛
                    </label>
                    <input
                      type="text"
                      id="playerName"
                      value={playerName}
                      onChange={(e) => setPlayerName(e.target.value)}
                      placeholder="예: 1111 노재혁"
                      className="w-full text-lg px-5 py-4 rounded-2xl border-2 border-purple-100 focus:ring-4 focus:ring-purple-100 focus:border-purple-400 transition-all bg-purple-50/30 outline-none font-bold placeholder:font-normal"
                      maxLength={15}
                    />
                  </div>
                  <div className="flex-1">
                    <label htmlFor="distance" className="block text-sm font-black text-slate-700 mb-2 flex items-center">
                      <RulerIcon className="mr-1 text-blue-500" />
                      자가 떨어진 거리 (cm) 📏
                    </label>
                    <div className="relative">
                      <input
                        type="number"
                        id="distance"
                        value={distance}
                        onChange={(e) => setDistance(e.target.value)}
                        placeholder="예: 15.5"
                        step="0.1"
                        className="w-full text-lg px-5 py-4 rounded-2xl border-2 border-purple-100 focus:ring-4 focus:ring-purple-100 focus:border-purple-400 transition-all bg-purple-50/30 outline-none font-bold placeholder:font-normal"
                      />
                      <span className="absolute right-5 top-1/2 -translate-y-1/2 text-purple-400 font-black">cm</span>
                    </div>
                  </div>
                </div>
                <button
                  type="submit"
                  disabled={isSubmitting}
                  className={`w-full text-white font-black text-lg py-4 px-8 rounded-2xl transition-all shadow-lg flex items-center justify-center mt-2 ${
                    isSubmitting
                      ? 'bg-slate-300 cursor-not-allowed' 
                      : 'bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 hover:-translate-y-1 hover:shadow-purple-300/50 active:translate-y-0'
                  }`}
                >
                  {isSubmitting ? '저장 중... 슝슝 🚀' : '✨ 내 기록 랭킹에 올리기 ✨'}
                </button>
              </form>
              {error && <p className="text-red-500 text-sm mt-4 font-bold flex items-center bg-red-50 p-3 rounded-xl"><InfoIcon size={16} className="mr-1"/>{error}</p>}
            </div>

            {/* 랭킹 섹션 (명예의 전당) */}
            {rankedHistory.length > 0 && (
              <div className="bg-gradient-to-br from-yellow-100 to-orange-100 rounded-[2rem] shadow-xl shadow-orange-200/50 border-4 border-white overflow-hidden transform transition-all hover:scale-[1.01]">
                <div className="p-5 sm:p-6 border-b-2 border-white/50 flex items-center bg-white/40">
                  <TrophyIcon className="mr-2 text-orange-500" />
                  <h2 className="text-xl font-black text-orange-800">🔥 우리반 명예의 전당 (Top 3) 🔥</h2>
                </div>
                <ul className="divide-y-2 divide-white/50 p-2">
                  {rankedHistory.slice(0, 3).map((record, index) => (
                    <li key={`rank-${record.id}`} className="p-4 flex items-center justify-between bg-white/60 hover:bg-white rounded-2xl m-2 transition-colors shadow-sm">
                      <div className="flex items-center gap-4">
                        <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-xl shrink-0 shadow-inner ${
                          index === 0 ? 'bg-gradient-to-br from-yellow-300 to-yellow-500 text-white' :
                          index === 1 ? 'bg-gradient-to-br from-slate-300 to-slate-400 text-white' :
                          index === 2 ? 'bg-gradient-to-br from-orange-300 to-orange-500 text-white' : ''
                        }`}>
                          {index + 1}등
                        </div>
                        <div>
                          <span className="font-black text-lg text-slate-800">{record.playerName}</span>
                          <p className="text-sm font-bold text-orange-600 bg-orange-100 px-2 py-0.5 rounded-full inline-block ml-2">{record.distance}cm</p>
                        </div>
                      </div>
                      <div className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-red-500">
                        {record.time.toFixed(3)}s
                      </div>
                    </li>
                  ))}
                </ul>
              </div>
            )}

            {/* 누적 기록 섹션 */}
            <div className="bg-white rounded-[2rem] shadow-xl shadow-purple-200/50 border-4 border-white overflow-hidden">
              <div className="p-5 sm:p-6 border-b-2 border-purple-50 flex justify-between items-center bg-purple-50/50">
                <h2 className="text-lg font-black text-slate-800 flex items-center">
                  <HistoryIcon className="mr-2 text-purple-600" />
                  도전 현황
                  <span className="ml-3 bg-purple-200 text-purple-800 py-1 px-3 rounded-full text-sm font-black shadow-inner">
                    총 {history.length}회 도전!
                  </span>
                </h2>
                {history.length > 0 && (
                  <button
                    onClick={handleResetHistory}
                    className="text-slate-400 hover:text-white transition-all p-2 rounded-xl hover:bg-red-500 flex items-center text-sm font-bold"
                  >
                    <Trash2Icon className="mr-1" /> 리셋
                  </button>
                )}
              </div>
              
              {history.length === 0 ? (
                <div className="p-10 text-center text-purple-400 font-bold text-lg bg-purple-50/30">
                  아직 도전자가 없어요! 😲<br/>가장 먼저 기록을 남겨보세요!
                </div>
              ) : (
                <ul className="max-h-[500px] overflow-y-auto p-3 space-y-3 bg-slate-50/50">
                  {history.map((record, index) => (
                    <li key={record.id} className="p-4 sm:p-5 bg-white border-2 border-transparent hover:border-purple-200 rounded-2xl transition-all shadow-sm hover:shadow-md flex flex-col sm:flex-row sm:items-center justify-between gap-4 group">
                      <div className="flex items-center gap-4">
                        <div className="w-10 h-10 rounded-xl bg-purple-100 text-purple-600 flex items-center justify-center font-black text-sm shrink-0 group-hover:bg-purple-200 transition-colors">
                          #{history.length - index}
                        </div>
                        <div>
                          <div className="flex items-baseline gap-2 mb-1">
                            <span className="text-2xl font-black text-slate-800">
                              {record.distance >= 50 ? "😂 놓침!" : `${record.time.toFixed(3)}초`}
                            </span>
                            <span className="text-sm font-bold text-slate-500">
                              {record.playerName} <span className="text-purple-400">({record.distance}cm)</span>
                            </span>
                          </div>
                          <p className="text-sm font-bold text-pink-500 bg-pink-50 inline-block px-2 py-1 rounded-lg mt-1">{record.message}</p>
                        </div>
                      </div>
                    </li>
                  ))}
                </ul>
              )}
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
